name: Automated Rise In Event Sync

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Initialize Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci

      - name: Execute Rise In Data Sync Pipeline
        run: node scripts/sync-events.js

      - name: Commit and Push Automated Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/events.ts
          git diff-index --quiet HEAD || (git commit -m "chore: automated background sync of Rise In events" && git push)